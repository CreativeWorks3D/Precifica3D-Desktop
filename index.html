<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Precifica3D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Precifica3D — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Space Grotesk",sans-serif;background:#0d0d0f;color:#f0f0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;}
#splash{position:fixed;inset:0;background:#0d0d0f;display:flex;align-items:center;justify-content:center;z-index:99999;}
.splash-spinner{width:36px;height:36px;border:3px solid #2a2a35;border-top-color:#f97316;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-box{opacity:0;transition:opacity 0.2s;}
.login-box.visible{opacity:1;}
.login-box{background:#16161a;border:1px solid #2a2a35;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:1.2rem;}
.login-logo{width:72px;height:72px;background:rgba(249,115,22,0.15);border:1px solid #f97316;border-radius:18px;display:flex;align-items:center;justify-content:center;}
.login-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;}
.login-sub{font-size:13px;color:#8888a0;margin-top:-0.5rem;}
.login-field{width:100%;display:flex;flex-direction:column;gap:6px;}
.login-field label{font-size:11px;font-weight:600;color:#8888a0;text-transform:uppercase;letter-spacing:0.06em;}
.login-field input{width:100%;padding:12px 14px;background:#1e1e24;border:1px solid #2a2a35;border-radius:8px;color:#f0f0f5;font-size:14px;outline:none;transition:border-color 0.2s;}
.login-field input:focus{border-color:#f97316;}
.login-btn{width:100%;padding:13px;background:#f97316;border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:0.25rem;}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;}
.login-error{width:100%;padding:10px 14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#ef4444;font-size:13px;text-align:center;display:none;}
.login-success{width:100%;padding:10px 14px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#22c55e;font-size:13px;text-align:center;display:none;}
.login-forgot{font-size:12px;color:#8888a0;background:none;border:none;cursor:pointer;text-decoration:underline;}
.login-forgot:hover{color:#f97316;}
.login-footer{font-size:11px;color:#55556a;text-align:center;}
</style>
</head>
<body>
<div id="splash"><div class="splash-spinner"></div></div>
<div class="login-box" id="login-box">
  <div class="login-logo">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="24" width="24" height="4" rx="2" fill="#f97316" opacity="0.35"/>
      <rect x="4" y="8" width="3" height="17" rx="1.5" fill="#f97316" opacity="0.6"/>
      <rect x="4" y="8" width="18" height="3" rx="1.5" fill="#f97316"/>
      <rect x="17" y="8" width="4" height="7" rx="1.5" fill="#f97316"/>
      <path d="M18.5 15 L19 18 L19.5 15" stroke="#f97316" stroke-width="1.2" fill="#f97316"/>
      <rect x="8" y="21" width="10" height="3" rx="1" fill="#f97316" opacity="0.5"/>
      <rect x="9" y="18" width="8" height="3" rx="1" fill="#f97316" opacity="0.4"/>
      <rect x="10" y="15.5" width="6" height="2.5" rx="1" fill="#f97316" opacity="0.65"/>
    </svg>
  </div>
  <div class="login-title">Precifica3D</div>
  <div class="login-sub">Faça login para acessar</div>
  <div class="login-field">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="login-field">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="login-error" id="login-error"></div>
  <div class="login-success" id="login-success"></div>
  <button class="login-btn" id="login-btn" onclick="fazerLogin()">Entrar</button>
  <button class="login-forgot" onclick="esqueceuSenha()">Esqueci minha senha</button>
  <div class="login-footer">Creative Works 3D &copy; 2024</div>
</div>

<script>
// Limpa service workers e cache antigos
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(reg) { reg.unregister(); });
  });
  caches.keys().then(function(names) {
    names.forEach(function(name) { caches.delete(name); });
  });
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_TmUQN_JQwYh-QQzdmehMhqe1Apnqwv8",
  authDomain: "calculadora3d-5d2db.firebaseapp.com",
  projectId: "calculadora3d-5d2db",
  storageBucket: "calculadora3d-5d2db.firebasestorage.app",
  messagingSenderId: "40753148792",
  appId: "1:40753148792:web:8b900e70fbdbcb3eea8e8d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "calculadora.html";
  } else {
    document.getElementById("splash").style.display = "none";
    document.getElementById("login-box").classList.add("visible");
  }
});

window.fazerLogin = async function() {
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  const btn = document.getElementById("login-btn");
  const erro = document.getElementById("login-error");
  const sucesso = document.getElementById("login-success");
  erro.style.display = "none";
  sucesso.style.display = "none";
  if (!email || !senha) { erro.textContent = "Preencha e-mail e senha."; erro.style.display = "block"; return; }
  btn.disabled = true;
  btn.textContent = "Entrando...";
  try {
    await signInWithEmailAndPassword(auth, email, senha);
    sucesso.textContent = "Login realizado! Redirecionando...";
    sucesso.style.display = "block";
    window.location.href = "calculadora.html";
  } catch(e) {
    erro.textContent = "E-mail ou senha incorretos.";
    erro.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
};

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("login-senha").addEventListener("keydown", (e) => { if(e.key==="Enter") window.fazerLogin(); });
  document.getElementById("login-email").addEventListener("keydown", (e) => { if(e.key==="Enter") document.getElementById("login-senha").focus(); });
});

window.esqueceuSenha = async function() {
  const email = document.getElementById("login-email").value.trim();
  const erro = document.getElementById("login-error");
  const sucesso = document.getElementById("login-success");
  erro.style.display = "none";
  sucesso.style.display = "none";
  if (!email) { erro.textContent = "Digite seu e-mail acima."; erro.style.display = "block"; return; }
  try {
    await sendPasswordResetEmail(auth, email);
    sucesso.textContent = "E-mail de redefinição enviado!";
    sucesso.style.display = "block";
  } catch(e) {
    erro.textContent = "Não foi possível enviar o e-mail.";
    erro.style.display = "block";
  }
};
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() { navigator.serviceWorker.register('./sw.js'); });
}
</script>
</body>
</html>
